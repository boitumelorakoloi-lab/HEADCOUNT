<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUL Headcount</title>
    <script>
      (function() {
        var saved = localStorage.getItem('nul-dark');
        var dark = saved !== null
          ? saved === 'true'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <style>
      #splash {
        position: fixed; inset: 0;
        background: white;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      .dark #splash { background: #020817; }
      #splash.fade { opacity: 0; pointer-events: none; }
    </style>

    <div id="splash">
    <div style="
      width:80px; height:80px; border-radius:16px;
      background:#4f46e5; display:flex; align-items:center;
      justify-content:center; margin-bottom:24px;
      animation: pulse 2s ease-in-out infinite;
    ">
      <svg viewBox="0 0 24 24" fill="none" width="44" height="44"
        stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
        <path d="M6 12v5c3.33 2 8.67 2 12 0v-5"/>
      </svg>
    </div>
    <h1 style="font-size:28px; font-weight:700; letter-spacing:-0.02em; color:#111827; margin-bottom:6px;">
      HEADCOUNT
    </h1>
    <p style="font-size:12px; color:#9ca3af; letter-spacing:0.15em; text-transform:uppercase;">
      NUL Attendance Management System
    </p>
    <div style="margin-top:32px; display:flex; gap:6px;">
      <span style="width:6px;height:6px;border-radius:50%;background:#4f46e5;animation:bounce 1.4s ease-in-out infinite;"></span>
      <span style="width:6px;height:6px;border-radius:50%;background:#4f46e5;animation:bounce 1.4s ease-in-out infinite 0.2s;"></span>
      <span style="width:6px;height:6px;border-radius:50%;background:#4f46e5;animation:bounce 1.4s ease-in-out infinite 0.4s;"></span>
    </div>
  </div>

  <style>
    @keyframes pulse {
      0%,100% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }
  </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
